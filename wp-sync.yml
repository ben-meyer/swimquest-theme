# WP Sync Configuration
# WP CLI Sync is a WP-CLI package designed for single-command CLI migrations between WordPress environments. It provides a straightforward way to synchronize the database, themes, plugins etc. between different environments.
# See: https://github.com/jerome-toole/wp-sync

pull:
    db: true
    themes: false
    plugins: true
    uploads: true
    db_backup: true

push:
    db: true
    themes: false
    plugins: true
    uploads: true
    db_backup: true

environments:
    local:
        url: https://swimquest.ddev.site

    staging:
        host: benmeyer@benmeyer.digital
        port: 22
        path: /home/benmeyer/swimquest.benmeyer.digital
        url: https://swimquest.benmeyer.digital

    production:
        host: user@host
        path: /home/.../public_html
        url: https://swimquest.co.uk
